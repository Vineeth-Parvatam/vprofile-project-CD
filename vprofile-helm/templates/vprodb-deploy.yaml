apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    app: vprofile-db
  name: vprofile-db
  namespace: vprofile
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vprofile-db
  strategy: {}
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: vprofile-db
    spec:
      containers:
      - image: vineeth2210/vprofile-db:latest
        name: vprofile-db
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              key: MYSQL_ROOT_PASSWORD
              name: vprodb-secret
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              key: MYSQL_USER
              name: vprodb-secret
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              key: MYSQL_PASSWORD
              name: vprodb-secret
        - name: MYSQL_DATABASE
          valueFrom:
            configMapKeyRef:
              key: MYSQL_DATABASE
              name: vprodb-cm
        resources: {}
status: {}
